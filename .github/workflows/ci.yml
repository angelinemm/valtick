name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: valtick
          POSTGRES_PASSWORD: valtick
          POSTGRES_DB: valtick_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://valtick:valtick@localhost:5432/valtick_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
        run: npm run db:generate

      - name: Run migrations
        run: npx prisma migrate deploy --schema=prisma/schema.prisma

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test (backend + shared)
        run: npm test

      - name: Test (frontend)
        run: npm run test --workspace=apps/frontend
